; ============================================================
; GenSoft Sync — put GenSoftSync.exe + this file in ONE folder
; Your VFP BAT and Excel files use that same folder.
; ============================================================

[cloud]
api_url = https://gensoft-order.onrender.com
username = YOUR_CLOUD_USERNAME
password = YOUR_CLOUD_PASSWORD

[vfp]
; BAT / EXE that runs your VFP PRG.
; Leave as run_vfp_export.bat if that BAT sits next to GenSoftSync.exe
; Or use a full path: C:\MySoftware\run_vfp_export.bat
run_command = run_vfp_export.bat

[sync]
; Excel folder = same as GenSoftSync.exe (leave as . )
; Your PRG must create files HERE:
;   customers.xlsx
;   products_stock.xlsx
;   outstanding.xlsx
folder = .

; How often to run (minutes). Minimum 5.
every_minutes = 60

; After a file uploads OK → delete it from this same folder
delete_after_upload = true

; Full dump OK — unchanged rows are skipped.
; true = also remove cloud rows missing from this Excel file
replace_all = true

; Run once immediately when the app starts
run_on_start = true

; Max seconds to wait for the VFP/BAT to finish
export_timeout_sec = 600
