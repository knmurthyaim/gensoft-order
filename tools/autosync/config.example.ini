[server]
api_url = https://gensoft-order.onrender.com

[login]
username = vajra
password = demo1234

# source = external | folder | sql
# external = run your VFP6-built EXE / BAT that writes Excel or TXT into export_dir
# folder   = only upload files already present
# sql      = Lamrin SQL Server (not used for VFP sites)
[sync]
source = external
export_dir = C:\GenSoftExports
interval_minutes = 60
sync_types = customers,products,outstanding
replace_all = true
outstanding_mode = sale_invoices
run_on_start = true

[external]
; Example: "C:\YourBilling\ExportToGenSoft.exe"
; Or:      "C:\GenSoftExports\run_vfp_export.bat"
command =
working_dir = C:\GenSoftExports
timeout_sec = 600

[sql]
server = .
database = Lamrin
user = sa
password = Gensoft123
driver = ODBC Driver 17 for SQL Server
trust_server_certificate = true
